<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | NovaTech Solutions</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">NovaTech Solutions</a>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/about.html">About</a>
                    <a href="/contact.html" class="active">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Get in Touch</h1>
        <p>Have a security concern? Contact our rapid response team today.</p>

        <form action="/submit.html" method="GET">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Corporate Email</label>
                <input type="email" id="email" placeholder="john@company.com" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 NovaTech Solutions. All rights reserved.</p>
        </div>
    </footer>
    <script src="/assets/js/app.js"></script>
</body>

</html>
