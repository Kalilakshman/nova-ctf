<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Security Monitor | NovaTech</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <div class="container" style="margin-top: 5rem; text-align: center;">
        <h1 style="color: #cc0000;" id="status-title">⚠️ ACCESS LOGGED</h1>
        <div id="alert-box" class="alert">
            Security Alert: This directory is monitored. Unauthorized access attempts are logged and reported to the
            system administrator.
        </div>
        <div id="lockout-ui" style="display: none;">
            <div class="code-box" style="color: red; border: 2px solid red;">
                SYSTEM LOCKOUT INITIATED<br>
                Uplink terminated.<br>
                Terminal ID: NT-993-B
            </div>
            <p>Scanning local filesystem... <span id="progress">0</span>%</p>
        </div>
        <p>Your session ID: <span id="sess-id"></span></p>
        <p><a href="/" id="disconnect-btn">Disconnect Now</a></p>
    </div>
    <script>
        document.getElementById('sess-id').innerText = Math.random().toString(36).substring(7).toUpperCase();

        // Lockout Simulation to waste participant time
        setTimeout(() => {
            document.getElementById('status-title').innerText = "🚫 SYSTEM LOCKED";
            document.getElementById('alert-box').style.background = "#000";
            document.getElementById('alert-box').style.color = "#ff0000";
            document.getElementById('alert-box').innerText = "FATAL: MULTIPLE VIOLATIONS DETECTED. LOCAL ACCOUNT SUSPENDED.";
            document.getElementById('lockout-ui').style.display = 'block';
            document.getElementById('disconnect-btn').style.display = 'none';

            let prog = 0;
            const interval = setInterval(() => {
                prog += Math.floor(Math.random() * 5);
                if (prog >= 100) {
                    prog = 100;
                    clearInterval(interval);
                    document.body.innerHTML = '<div style="background:#000; color:#0f0; height:100vh; padding:5rem; font-family:monospace;">[ERROR] Connection reset by peer. <br><br> _</div>';
                }
                document.getElementById('progress').innerText = prog;
            }, 800);
        }, 3000);
    </script>
    <script src="/assets/js/app.js"></script>
</body>

</html>
